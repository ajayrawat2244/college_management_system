{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found · SMS</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body class="auth-page">
  <div style="min-height:100vh;display:grid;place-items:center;background:var(--surface-1)">
    <div style="text-align:center;max-width:480px;padding:3rem 2rem">
      <div style="font-size:4rem;font-weight:900;color:var(--muted);margin-bottom:1rem">404</div>
      <h1>Page Not Found</h1>
      <p style="color:var(--muted);margin-bottom:2rem">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <a href="/" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--brand);color:#fff;border-radius:var(--r-sm);text-decoration:none;font-weight:600">
        Back to Home
      </a>
    </div>
  </div>
</body>
</html>

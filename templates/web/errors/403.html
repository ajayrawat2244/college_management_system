{% extends "web/base_auth.html" %}
{% block title %}Access Denied · SMS{% endblock %}

{% block body %}
<div style="min-height:100vh;display:grid;place-items:center;background:var(--surface-1)">
  <div style="text-align:center;max-width:480px;padding:3rem 2rem">
    <div class="brand-mark large" style="margin:0 auto 1.5rem;font-size:2rem;background:var(--surface-2)">403</div>
    <h1>Access denied</h1>
    <p class="muted" style="margin-bottom:2rem">
      You don't have permission to access this page.
      If you think this is a mistake, contact your college administrator.
    </p>
    <a class="btn btn-primary" href="{% url 'web:dashboard' %}">Back to dashboard</a>
  </div>
</div>
{% endblock %}

{% extends "web/base_auth.html" %}
{% block title %}Registration Complete · SMS{% endblock %}

{% block body %}
<div style="min-height:100vh;display:grid;place-items:center;background:var(--surface-1)">
  <div style="text-align:center;max-width:460px;padding:3rem 2rem">
    <div style="width:72px;height:72px;border-radius:50%;background:#22c55e;display:grid;place-items:center;margin:0 auto 1.5rem;font-size:2rem">✓</div>
    <h1 style="font-size:1.75rem;margin-bottom:.75rem">You're all set!</h1>
    <p style="color:var(--muted);margin-bottom:2rem">Your college workspace has been created. You're now being redirected to your dashboard.</p>
    <a class="btn btn-primary" href="{% url 'web:dashboard' %}">Go to Dashboard &rarr;</a>
  </div>
</div>
{% endblock %}
